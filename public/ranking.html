<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORN 2 CHEER | 랭킹</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="BORN 2 CHEER 홈"><img src="assets/born-2-cheer-logo.png" alt="BORN 2 CHEER"></a>
        <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false">☰</button>
        <nav class="site-nav" aria-label="주요 메뉴">
            <a href="index.html">홈</a>
            <a href="game.html">게임소개</a>
            <a href="stats.html">팀 소개</a>
            <a href="gallery.html">갤러리</a>
            <a class="active" href="ranking.html">랭킹</a>
            <a href="download.html">내 영상</a>
            <a href="contact.html">문의하기</a>
        </nav>
    </header>

    <main>
        <section class="page-hero compact">
            <p class="eyebrow">Leaderboard</p>
            <h1>랭킹</h1>
            <p>승리의 순간으로 쌓인 점수, 지금 가장 즐거운 플레이어를 확인해보세요.</p>
        </section>

        <section class="section reveal">
            <div class="section-head">
                <p class="eyebrow">Team Ranking</p>
                <h2>팀별 순위</h2>
            </div>
            <div id="teamRanking" class="podium-grid">
                <article class="podium-card first"><span>1위</span><strong>집계 중</strong><em>0점</em></article>
                <article class="podium-card"><span>2위</span><strong>집계 중</strong><em>0점</em></article>
                <article class="podium-card"><span>3위</span><strong>집계 중</strong><em>0점</em></article>
            </div>
        </section>

        <section class="section reveal">
            <div class="section-head">
                <div>
                    <p class="eyebrow">Player Ranking</p>
                    <h2>개인 랭킹</h2>
                </div>
            </div>
            <div class="ranking-search-card">
                <label for="rankingSearch">닉네임 검색</label>
                <div class="search-row">
                    <input id="rankingSearch" class="search-input" type="search" autocomplete="off" placeholder="닉네임을 검색해보세요">
                    <button class="btn primary" type="button" onclick="renderRanking()">검색</button>
                </div>
            </div>
            <div class="table-shell">
                <table>
                    <thead>
                        <tr>
                            <th>순위</th>
                            <th>닉네임</th>
                            <th>응원 팀</th>
                            <th>점수</th>
                        </tr>
                    </thead>
                    <tbody id="rankingTableBody">
                        <tr><td colspan="4" class="empty-cell">랭킹을 불러오는 중입니다.</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="site.js"></script>
    <script>
        const formatter = new Intl.NumberFormat('ko-KR');
        let rankingData = [];

        function teamLogo(team) {
            if (team === 'Silent Wolves') return 'assets/logo-wolves.png';
            if (team === 'Angry Bees') return 'assets/logo-bees.png';
            return 'assets/logo-penguins.png';
        }

        function renderTeamRanking(data) {
            const totals = data.reduce((acc, match) => {
                const team = match.team || 'Symphony Penguins';
                acc[team] = (acc[team] || 0) + Number(match.totalScore || 0);
                return acc;
            }, {});
            const teams = Object.entries(totals).sort((a, b) => b[1] - a[1]).slice(0, 3);
            const defaults = [['Symphony Penguins', 0], ['Silent Wolves', 0], ['Angry Bees', 0]];
            const list = teams.length ? teams : defaults;
            document.getElementById('teamRanking').innerHTML = list.map(([team, score], index) => `
                <article class="podium-card ${index === 0 ? 'first' : ''}">
                    <span>${index + 1}위</span>
                    <img src="${teamLogo(team)}" alt="${team}">
                    <strong>${team}</strong>
                    <em>${formatter.format(score)}점</em>
                </article>
            `).join('');
        }

        function renderRanking() {
            const keyword = document.getElementById('rankingSearch').value.trim().toLowerCase();
            const filtered = rankingData.filter(match => (match.squadName || '').toLowerCase().includes(keyword));
            const tbody = document.getElementById('rankingTableBody');
            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-cell">검색 결과가 없습니다.</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map((match, index) => `
                <tr>
                    <td><span class="rank-badge">${index + 1}</span></td>
                    <td class="strong">${match.squadName || '-'}</td>
                    <td>${match.team || '-'}</td>
                    <td class="score">${formatter.format(match.totalScore || 0)}점</td>
                </tr>
            `).join('');
        }

        async function fetchRanking() {
            try {
                const response = await fetch('/api/get_ranking');
                const data = await response.json();
                rankingData = Array.isArray(data) ? data : [];
                renderTeamRanking(rankingData);
                renderRanking();
            } catch (error) {
                document.getElementById('rankingTableBody').innerHTML = '<tr><td colspan="4" class="empty-cell">서버 연결을 확인해 주세요.</td></tr>';
            }
        }

        document.getElementById('rankingSearch').addEventListener('input', renderRanking);
        document.getElementById('rankingSearch').addEventListener('keydown', event => {
            if (event.key === 'Enter') renderRanking();
        });
        fetchRanking();
    </script>
</body>
</html>
