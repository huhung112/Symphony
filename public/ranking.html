<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 응원 랭킹</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; }
        .card { background-color: #1e1e1e; border: none; }
        .text-highlight { color: #f39c12; }
    </style>
</head>
<body class="p-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="text-highlight">🏆 명예의 전당 (전체 랭킹)</h1>
            <a href="stats.html" class="btn btn-outline-warning">팀별 통계 보기 👉</a>
        </div>

        <div class="card p-4">
            <table class="table table-dark table-hover text-center">
                <thead>
                    <tr>
                        <th>순위</th>
                        <th>응원단 이름</th>
                        <th>응원한 팀</th>
                        <th>협동 총점</th>
                    </tr>
                </thead>
                <tbody id="rankingTableBody">
                    <!-- 데이터가 여기에 들어갑니다 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchRanking() {
            try {
                // 점수 높은 순으로 정렬된 데이터를 가져옵니다.
                const response = await fetch('/api/get_ranking');
                const data = await response.json();

                const tbody = document.getElementById('rankingTableBody');
                tbody.innerHTML = '';
                
                // 모든 데이터를 순위와 함께 출력합니다.
                data.forEach((match, index) => {
                    let rankIcon = (index === 0) ? '🥇' : (index === 1) ? '🥈' : (index === 2) ? '🥉' : `${index + 1}위`;
                    
                    const row = `<tr>
                        <td class="fs-5">${rankIcon}</td>
                        <td class="fs-5 fw-bold">${match.squadName}</td>
                        <td>${match.team}</td>
                        <td class="text-warning fw-bold">${match.totalScore.toLocaleString()}점</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error('랭킹 데이터를 불러오는데 실패했습니다.', error);
            }
        }

        fetchRanking();
    </script>
</body>
</html>
