<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORN 2 CHEER | Angry Bees</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="team-page bees-page">
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="BORN 2 CHEER 홈"><img src="assets/born-2-cheer-logo.png" alt="BORN 2 CHEER"></a>
        <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false">☰</button>
        <nav class="site-nav" aria-label="주요 메뉴">
            <a href="index.html">홈</a>
            <a href="game.html">게임소개</a>
            <a class="active" href="stats.html">팀 소개</a>
            <a href="gallery.html">갤러리</a>
            <a href="ranking.html">랭킹</a>
            <a href="download.html">내 영상</a>
            <a href="contact.html">문의하기</a>
        </nav>
    </header>

    <main>
        <section class="team-detail-hero bees">
            <div class="team-hero-copy">
                <p class="eyebrow">FAST AND FEARLESS</p>
                <h1>빠르게, 과감하게,<br>승리를 쏘아 올린다!</h1>
                <p>앵그리 비즈는 톡톡 튀는 에너지와 공격적인 플레이로 분위기를 뒤집는 옐로우 팀입니다.</p>
                <div class="hero-actions">
                    <a class="btn primary" href="#team-video">팀 소개 영상 보기</a>
                    <a class="btn secondary" href="#team-song">응원가 듣기</a>
                </div>
            </div>
        </section>

        <section class="team-media-section reveal">
            <article class="media-panel" id="team-video">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Team Video</p>
                        <h2>팀 소개 영상</h2>
                    </div>
                </div>
                <video controls poster="assets/gallery-bees-highfive.png">
                    <source src="assets/media/bees_team_video.mp4.mp4" type="video/mp4">
                    브라우저가 영상을 지원하지 않습니다.
                </video>
            </article>
            <article class="media-panel" id="team-song">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Cheer Song</p>
                        <h2>팀 응원가</h2>
                    </div>
                </div>
                <audio controls>
                    <source src="assets/media/bees_cheer_song.mp3" type="audio/mpeg">
                    브라우저가 오디오를 지원하지 않습니다.
                </audio>
            </article>
        </section>

        <section class="other-teams-section reveal">
            <div class="other-title">
                <p class="eyebrow">Teams<br></p>
                <h2>다른 팀 둘러보기<br></h2>
                <span>다양한 팀들의 개성과 응원 스타일을 확인해보세요!</span>
            </div>
            <div class="other-team-grid">
                <a class="other-team-card penguins" href="team-penguins.html">
                    <img src="assets/team-card-penguins.png" alt="Symphony Penguins">
                    <div><strong>심포니 펭귄즈</strong><span>서로의 에너지로 함께 승리하는 블루 팀</span></div>
                </a>
                <a class="other-team-card wolves" href="team-wolves.html">
                    <img src="assets/team-card-wolves.png" alt="Silent Wolves">
                    <div><strong>사일런트 울브즈</strong><span>조용하지만 강렬한 집중력으로 승리를 노리는 팀</span></div>
                </a>
            </div>
        </section>
    </main>

    <script src="site.js"></script>
</body>
</html>
