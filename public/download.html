<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 응원 영상 다운로드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; }
        .card { background-color: #1e1e1e; border: none; }
        .text-highlight { color: #f39c12; }
    </style>
</head>
<body class="p-5 text-center">
    <div class="container" style="max-width: 600px;">
        <h1 class="mb-4 text-highlight">🎬 내 영상 찾기</h1>
        <p class="mb-5 text-secondary">게임 결과 화면에 표시된 6자리 일련번호를 입력하세요.</p>
        
        <div class="card p-5 mb-4 shadow-lg">
            <div class="input-group mb-3">
                <input type="text" id="serialInput" class="form-control form-control-lg text-center fw-bold" placeholder="예: 123456" maxlength="6">
                <button class="btn btn-success btn-lg" onclick="searchVideo()">검색</button>
            </div>
            <div id="resultArea" class="mt-4" style="display: none;">
                <!-- 영상이 찾아지면 여기에 표시됩니다 -->
            </div>
        </div>

        <a href="index.html" class="btn btn-outline-secondary">🏠 대시보드로 돌아가기</a>
    </div>

    <script>
        function searchVideo() {
            const serial = document.getElementById('serialInput').value.trim();
            const resultArea = document.getElementById('resultArea');

            if (serial.length === 0) {
                alert("일련번호를 입력해주세요!");
                return;
            }

            // 서버에 저장된 영상 경로 (예: /videos/123456.mp4)
            const videoUrl = `/videos/${serial}.mp4`;

            // 영상이 실제로 존재하는지 꼼꼼하게 체크합니다.
            fetch(videoUrl, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        // 영상이 존재하면 플레이어와 다운로드 버튼을 보여줌
                        resultArea.innerHTML = `
                            <h4 class="text-info mb-3">🎉 영상을 찾았습니다!</h4>
                            <video src="${videoUrl}" controls class="w-100 rounded mb-3" style="max-height: 300px; background: #000;"></video>
                            <a href="${videoUrl}" download="cheer_${serial}.mp4" class="btn btn-warning btn-lg w-100 fw-bold">💾 영상 기기에 저장하기</a>
                        `;
                        resultArea.style.display = 'block';
                    } else {
                        // 영상이 없으면 에러 메시지
                        resultArea.innerHTML = `<h5 class="text-danger">❌ 해당 일련번호의 영상이 아직 서버에 없거나 번호가 틀렸습니다.</h5>`;
                        resultArea.style.display = 'block';
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("서버 연결에 문제가 발생했습니다.");
                });
        }
    </script>
</body>
</html>
